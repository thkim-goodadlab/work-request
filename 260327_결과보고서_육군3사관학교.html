<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>육군3사관학교 결과보고서</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d54c0f5967bec82cc041a0afef9e493b&libraries=services"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAFB;--surface:#FFFFFF;--surface-alt:#F1F5F9;
  --border:#E2E8F0;--border-light:#F1F5F9;
  --text:#0F172A;--text-secondary:#475569;--text-muted:#94A3B8;
  --accent:#2563EB;--accent-light:#DBEAFE;--accent-lighter:#EFF6FF;
  --positive:#059669;--positive-light:#D1FAE5;--positive-bg:#ECFDF5;
  --negative:#DC2626;--negative-light:#FEE2E2;--negative-bg:#FEF2F2;
  --warning:#D97706;--warning-light:#FEF3C7;--warning-bg:#FFFBEB;
  --orange:#EA580C;--orange-light:#FFEDD5;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.07);
  --r:14px;
}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.skeleton{background:linear-gradient(90deg,var(--surface-alt) 25%,#e2e8f0 50%,var(--surface-alt) 75%);background-size:200% 100%;animation:pulse 1.5s ease-in-out infinite;border-radius:8px;height:20px}
.report-header{background:linear-gradient(135deg,#1E293B,#334155);color:#fff;padding:40px 0;position:relative;overflow:hidden}
.report-header::before{content:"";position:absolute;top:-50%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,0.03),transparent 70%);pointer-events:none}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;position:relative}
.header-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.header-title{font-size:2rem;font-weight:900;letter-spacing:-0.04em;line-height:1.2}
.header-sub{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;font-weight:500}
.header-meta{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}
.meta-chip{background:rgba(255,255,255,0.08);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:6px}
.meta-chip svg{width:14px;height:14px;opacity:0.5}
.header-logo{position:absolute;top:20px;right:24px}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.08);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:20px;height:20px}
.logo-text{font-size:13px;font-weight:900;color:rgba(255,255,255,0.7);letter-spacing:-0.03em}
.live-indicator{display:inline-flex;align-items:center;gap:6px;background:rgba(5,150,105,0.15);border:1px solid rgba(5,150,105,0.2);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#34D399}
.live-dot{width:6px;height:6px;background:#34D399;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:-32px;position:relative;z-index:1}
.kpi-card{background:var(--surface);border-radius:var(--r);padding:20px;box-shadow:var(--shadow-md);border:1px solid var(--border-light);text-align:center}
.kpi-value{font-size:2rem;font-weight:900;letter-spacing:-0.03em;line-height:1;font-variant-numeric:tabular-nums}
.kpi-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-top:6px;text-transform:uppercase;letter-spacing:0.04em}
.kpi-sub{font-size:11px;font-weight:600;margin-top:4px}
.kpi-card.schools .kpi-value{color:var(--accent)}.kpi-card.schools .kpi-sub{color:var(--accent)}
.kpi-card.poster .kpi-value{color:#7C3AED}.kpi-card.poster .kpi-sub{color:#7C3AED}
.kpi-card.banner .kpi-value{color:var(--orange)}.kpi-card.banner .kpi-sub{color:var(--orange)}
.kpi-card.progress .kpi-value{color:var(--positive)}.kpi-card.progress .kpi-sub{color:var(--positive)}
.progress-section{margin-top:24px}
.progress-bar-wrap{background:var(--surface);border-radius:var(--r);padding:20px 24px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-title{font-size:13px;font-weight:700;color:var(--text-secondary)}
.progress-pct{font-size:22px;font-weight:900;color:var(--positive)}
.progress-track{height:10px;background:var(--surface-alt);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--positive));border-radius:5px;transition:width 0.8s ease}
.progress-detail{display:flex;gap:24px;margin-top:12px;font-size:12px;color:var(--text-muted);font-weight:600}
.progress-detail span{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-done{background:var(--positive)}.dot-remain{background:var(--border)}
.section{margin-top:32px}
.section-title{font-size:13px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:"";flex:1;height:1px;background:var(--border)}
.region-group{margin-bottom:24px}
.region-label{font-size:12px;font-weight:800;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.region-count{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-lighter);padding:2px 8px;border-radius:10px}
.summary-table-wrap{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden}
.summary-table{width:100%;border-collapse:collapse}
.summary-table thead th{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;padding:10px 14px;text-align:left;background:var(--surface-alt);border-bottom:1px solid var(--border);white-space:nowrap}
.summary-table thead th:nth-child(n+4){text-align:center}
.summary-table tbody td{font-size:12px;padding:10px 14px;border-bottom:1px solid var(--border-light);color:var(--text-secondary);vertical-align:middle}
.summary-table tbody td:first-child{font-weight:700;color:var(--text);text-align:center}
.summary-table tbody td:nth-child(n+4){text-align:center}
.summary-table tbody tr:last-child td{border-bottom:none}
.summary-table tbody tr:hover td{background:var(--accent-lighter)}
.summary-table tfoot td{font-size:12px;font-weight:800;padding:10px 14px;background:var(--surface-alt);color:var(--text);border-top:1px solid var(--border)}
.summary-table tfoot td:nth-child(n+4){text-align:center}
.region-tag{font-size:10px;font-weight:600;color:var(--text-muted)}
.summary-note{font-size:11px;color:var(--text-muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.date-text{font-variant-numeric:tabular-nums;font-weight:600;color:var(--text)}
.school-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden;margin-bottom:16px}
.school-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light)}
.school-info{display:flex;align-items:center;gap:12px}
.school-num{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.school-name{font-size:15px;font-weight:800;letter-spacing:-0.02em}
.school-addr{font-size:11px;color:var(--text-muted);margin-top:1px}
.school-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.status-done{background:var(--positive-bg);color:var(--positive)}
.status-pending{background:var(--surface-alt);color:var(--text-muted)}
.qty-header{display:flex;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border-light);background:var(--surface-alt)}
.qty-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700}
.qty-item .qty-label{font-size:11px;font-weight:600;color:var(--text-muted)}
.qty-poster{color:#7C3AED}.qty-banner{color:var(--orange)}
.attach-info{padding:12px 20px;display:flex;gap:24px;flex-wrap:wrap;font-size:13px;border-bottom:1px solid var(--border-light)}
.attach-info-item{display:flex;align-items:center;gap:6px}
.attach-info-label{font-size:11px;font-weight:600;color:var(--text-muted)}
.attach-info-value{font-weight:700;color:var(--text)}
.photo-section{padding:0 20px 16px}
.photo-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.photo-thumb{aspect-ratio:4/3;border-radius:10px;overflow:hidden;background:var(--surface-alt);position:relative;cursor:pointer;border:1px solid var(--border-light)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.2s}
.photo-thumb:hover img{transform:scale(1.05)}
.photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:11px;flex-direction:column;gap:4px}
.photo-placeholder svg{width:24px;height:24px;opacity:0.3}
.drive-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--accent);text-decoration:none;padding:4px 10px;border-radius:8px;transition:background 0.15s}
.drive-link:hover{background:var(--accent-lighter)}
.drive-link svg{width:14px;height:14px}
.school-gps-mini{width:100%;height:200px;border-radius:12px;margin-top:8px;border:1px solid var(--border-light);overflow:hidden}
.gps-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px}
.gps-badge.has-gps{background:var(--positive-bg);color:var(--positive)}
.gps-badge.no-gps{background:var(--surface-alt);color:var(--text-muted)}
.gps-legend-mini{display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--text-muted);font-weight:600}
.gps-legend-mini .gps-lg-item{display:flex;align-items:center;gap:4px}
.gps-legend-mini .gps-lg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.loading-wrap{text-align:center;padding:80px 20px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted);font-weight:600}
.error-wrap{text-align:center;padding:80px 20px;color:var(--negative)}
.refresh-btn{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:16px;font-family:inherit}
.report-footer{margin-top:48px;padding:28px 0;border-top:1px solid var(--border);text-align:center}
.footer-logo{font-size:13px;font-weight:800;color:var(--text-muted);letter-spacing:-0.01em}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.lightbox-close{position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-top:-24px}
  .kpi-value{font-size:1.5rem}
  .header-title{font-size:1.5rem}
  .container{padding:0 16px}
  .report-header{padding:28px 0}
  .header-logo{position:static;margin-bottom:14px}
  .school-card-header{flex-direction:column;align-items:flex-start;gap:10px}
  .photo-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .attach-info{flex-direction:column;gap:6px}
  .school-gps-mini{height:160px}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi-card{padding:14px 10px}
  .kpi-value{font-size:1.3rem}
  .header-title{font-size:1.3rem}
  .progress-detail{flex-direction:column;gap:6px}
}
@media print{
  .report-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .school-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
  .photo-thumb{break-inside:avoid}
}
</style>
</head>
<body>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="">
</div>
<div class="report-header">
  <div class="header-inner">
    <div class="header-logo"><div class="logo-mark">
      <div class="logo-icon"><svg viewBox="0 0 40 40" fill="none"><polygon points="20,6 34,32 6,32" fill="url(#lg)"/><defs><linearGradient id="lg" x1="20" y1="6" x2="20" y2="32" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7EB5F0"/><stop offset="100%" stop-color="#3B6CB5"/></linearGradient></defs></svg></div>
      <div class="logo-text">GOODADLAB</div>
    </div></div>
    <div class="header-label">Campaign Report</div>
    <div class="header-title">육군3사관학교 결과보고서</div>
    <div class="header-sub">좋은광고연구소 광고 게첨 실시간 현황</div>
    <div class="header-meta">
      <div class="meta-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>마감 : 3월 27일 금요일</div>
      <div class="meta-chip" id="metaSchools"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>로딩 중...</div>
      <div class="live-indicator"><span class="live-dot"></span>실시간</div>
    </div>
  </div>
</div>
<div class="container">
<div id="reportContent">
  <div class="loading-wrap"><div class="loading-spinner"></div><div class="loading-text">데이터를 불러오는 중...</div></div>
</div>
<div class="report-footer"><div class="footer-logo">좋은광고연구소</div></div>
</div>
<script>
var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzl7mY-tnpMFE_6R3kWCXQ2YAso9K9JasI7t2cRwBdbHh8kNXND-Xy4pdXWv-RghCVO/exec";
var CAMP_KEY = "육군3사관학교";
var AUTO_REFRESH_SEC = 300; // 5분마다 자동 새로고침

function escHtml(s){if(!s)return"";return s.toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function loadReportData(){
  fetch(WEB_APP_URL+"?action=report_data&camp="+encodeURIComponent(CAMP_KEY))
  .then(function(r){return r.json()})
  .then(function(json){
    if(json.status!=="ok"){showError(json.message||"데이터 로딩 실패");return}
    renderReport(json);
  })
  .catch(function(err){showError("네트워크 오류: "+err.message)})
}

function showError(msg){
  document.getElementById("reportContent").innerHTML=
    '<div class="error-wrap"><div style="font-size:48px;margin-bottom:16px">⚠️</div>'
    +'<div style="font-size:16px;font-weight:700">'+escHtml(msg)+'</div>'
    +'<button class="refresh-btn" onclick="loadReportData()">다시 시도</button></div>';
}

function renderReport(data){
  var s=data.stats, schools=data.schools;
  document.getElementById("metaSchools").innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>'+s.totalSchools+'개교 ('+s.regionText+')';
  var h="";

  // KPI 카드
  h+='<div class="kpi-grid fade-in">';
  h+='<div class="kpi-card schools"><div class="kpi-value">'+s.totalSchools+'</div><div class="kpi-label">대상 학교</div><div class="kpi-sub">'+s.regionText+'</div></div>';
  h+='<div class="kpi-card poster"><div class="kpi-value">'+s.totalPoster+'</div><div class="kpi-label">포스터 (장)</div><div class="kpi-sub">완료 '+s.donePoster+' / 잔여 '+(s.totalPoster-s.donePoster)+'</div></div>';
  h+='<div class="kpi-card banner"><div class="kpi-value">'+s.totalBanner+'</div><div class="kpi-label">현수막 (장)</div><div class="kpi-sub">완료 '+s.doneBanner+' / 잔여 '+(s.totalBanner-s.doneBanner)+'</div></div>';
  h+='<div class="kpi-card progress"><div class="kpi-value">'+s.pct+'%</div><div class="kpi-label">진행률</div><div class="kpi-sub">'+s.doneSchools+'/'+s.totalSchools+'개교 완료</div></div>';
  h+='</div>';

  // 프로그레스 바
  h+='<div class="progress-section fade-in" style="animation-delay:0.1s"><div class="progress-bar-wrap">';
  h+='<div class="progress-header"><span class="progress-title">전체 진행 현황</span><span class="progress-pct">'+s.pct+'%</span></div>';
  h+='<div class="progress-track"><div class="progress-fill" style="width:'+s.pct+'%"></div></div>';
  h+='<div class="progress-detail"><span><span class="dot dot-done"></span>완료 '+s.doneSchools+'개교</span>';
  h+='<span><span class="dot dot-remain"></span>잔여 '+s.remainSchools+'개교</span>';
  h+='<span style="margin-left:auto;color:var(--text-secondary)">최종 업데이트 : '+data.updatedAt+'</span></div></div></div>';

  // 요약 테이블
  h+='<div class="section fade-in" style="animation-delay:0.12s"><div class="section-title">전체 학교 요약</div>';
  h+='<div class="summary-table-wrap"><div style="overflow-x:auto"><table class="summary-table">';
  h+='<thead><tr><th>No.</th><th>학교명</th><th>주소</th><th>포스터</th><th>현수막</th><th>부착일시</th><th>상태</th><th>GPS</th><th>비고 (부착장소)</th></tr></thead><tbody>';
  var SVG_DONE='<span class="school-status status-done" style="display:inline-flex;font-size:10px;padding:2px 8px"><svg width="12" height="12" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="#059669"/><path d="M7 11l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>완료</span>';
  var SVG_PENDING='<span class="school-status status-pending" style="display:inline-flex;font-size:10px;padding:2px 8px"><svg width="12" height="12" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="none" stroke="#CBD5E1" stroke-width="2"/></svg>대기</span>';
  for(var i=0;i<schools.length;i++){
    var sc=schools[i];
    var pq=typeof sc.pQty==="number"&&sc.pQty>0?sc.pQty:"-";
    var bq=typeof sc.bQty==="number"&&sc.bQty>0?sc.bQty:"-";
    var dateCell=sc.postDate?'<td class="date-text">'+escHtml(sc.postDate)+'</td>':'<td style="color:var(--text-muted)">-</td>';
    var noteText=sc.note||"";
    var noteCell=noteText?'<td class="summary-note">'+escHtml(noteText)+'</td>':'<td class="summary-note" style="color:var(--text-muted)">-</td>';
    h+='<tr><td>'+(i+1)+'</td><td>'+escHtml(sc.name)+'</td><td class="region-tag">'+escHtml(sc.region+" "+sc.subAddr)+'</td>';
    h+='<td'+(pq!=="-"?' class="qty-poster"':'')+">"+ pq+'</td>';
    h+='<td'+(bq!=="-"?' class="qty-banner"':'')+">"+ bq+'</td>';
    var scGps=sc.gps||{poster:[],banner:[]};
    var scHasGps=(scGps.poster&&scGps.poster.length>0)||(scGps.banner&&scGps.banner.length>0);
    var gpsCell=scHasGps?'<td><span class="gps-badge has-gps" style="font-size:9px">📍 확인</span></td>':'<td><span class="gps-badge no-gps" style="font-size:9px">-</span></td>';
    h+=dateCell+'<td>'+(sc.isDone?SVG_DONE:SVG_PENDING)+'</td>'+gpsCell+noteCell+'</tr>';
  }
  h+='</tbody><tfoot><tr><td></td><td>합계 '+s.totalSchools+'개교</td><td></td><td class="qty-poster">'+s.totalPoster+'장</td><td class="qty-banner">'+s.totalBanner+'장</td><td></td><td></td><td></td><td></td></tr></tfoot></table></div></div></div>';

  // 학교별 카드
  h+='<div class="section fade-in" style="animation-delay:0.15s"><div class="section-title">학교별 부착 결과</div>';
  var curRegion="", regionCounts={};
  for(var rc=0;rc<schools.length;rc++)regionCounts[schools[rc].region]=(regionCounts[schools[rc].region]||0)+1;
  for(var si=0;si<schools.length;si++){
    var sc2=schools[si];
    if(sc2.region!==curRegion){if(curRegion)h+='</div>';curRegion=sc2.region;h+='<div class="region-group"><div class="region-label">'+curRegion+' <span class="region-count">'+regionCounts[curRegion]+'개교</span></div>'}
    var numBg=sc2.isDone?"var(--accent)":"var(--text-muted)";
    var statusHtml2=sc2.isDone?'<div class="school-status status-done"><svg width="14" height="14" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="#059669"/><path d="M7 11l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>완료</div>':'<div class="school-status status-pending"><svg width="14" height="14" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="none" stroke="#CBD5E1" stroke-width="2"/></svg>대기</div>';
    h+='<div class="school-card"><div class="school-card-header"><div class="school-info"><div class="school-num" style="background:'+numBg+'">' +(si+1)+'</div><div><div class="school-name">'+escHtml(sc2.name)+'</div><div class="school-addr">'+escHtml(sc2.addr)+'</div></div></div>'+statusHtml2+'</div>';
    // 수량 헤더
    h+='<div class="qty-header">';
    if(sc2.pQty)h+='<div class="qty-item"><span class="qty-label">포스터</span><span class="qty-poster">'+sc2.pQty+'장</span></div>';
    if(sc2.bQty)h+='<div class="qty-item"><span class="qty-label">현수막</span><span class="qty-banner">'+sc2.bQty+'장</span></div>';
    h+='</div>';
    // 부착정보
    if(sc2.isDone){
      var noteText2=sc2.note||"";
      h+='<div class="attach-info">';
      if(sc2.postDate)h+='<div class="attach-info-item"><span class="attach-info-label">부착일시</span><span class="attach-info-value">'+escHtml(sc2.postDate)+'</span></div>';
      if(noteText2)h+='<div class="attach-info-item"><span class="attach-info-label">비고</span><span class="attach-info-value">'+escHtml(noteText2)+'</span></div>';
      h+='</div>';
    }
    // 사진
    h+='<div class="photo-section" style="padding-top:12px"><div class="photo-label"><span>부착 사진</span>';
    if(sc2.driveUrl)h+='<a href="'+sc2.driveUrl+'" class="drive-link" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>전체 사진 보기</a>';
    h+='</div><div class="photo-grid">';
    var photos=sc2.photos||[];
    if(photos.length>0){for(var pi=0;pi<4;pi++){if(pi<photos.length){h+='<div class="photo-thumb" onclick="openLightbox(\''+photos[pi]+'\')"><img src="'+photos[pi]+'" alt="'+escHtml(sc2.name)+' 부착사진 '+(pi+1)+'" loading="lazy"></div>'}else if(pi<photos.length+1){h+=buildPlaceholder(sc2.isDone?"":"대기 중")}}}
    else{for(var pp=0;pp<4;pp++)h+=buildPlaceholder(sc2.isDone?"사진 없음":"대기 중")}
    h+='</div>';
    // GPS 미니맵 (포스터=보라, 현수막=주황)
    var gpsData=sc2.gps||{poster:[],banner:[]};
    var hasGps=(gpsData.poster&&gpsData.poster.length>0)||(gpsData.banner&&gpsData.banner.length>0);
    if(hasGps){
      h+='<div style="margin-top:12px;padding:0 0 4px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:11px;font-weight:700;color:var(--text-muted)">부착 위치</span><span class="gps-badge has-gps"><svg width="10" height="10" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="#059669"/><path d="M7 11l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>GPS 확인됨</span></div>';
      h+='<div class="school-gps-mini" id="minimap-'+si+'"></div>';
      h+='<div class="gps-legend-mini">';
      if(gpsData.poster&&gpsData.poster.length>0)h+='<span class="gps-lg-item"><span class="gps-lg-dot" style="background:#7C3AED"></span>포스터 '+gpsData.poster.length+'건</span>';
      if(gpsData.banner&&gpsData.banner.length>0)h+='<span class="gps-lg-item"><span class="gps-lg-dot" style="background:#EA580C"></span>현수막 '+gpsData.banner.length+'건</span>';
      h+='</div></div>';
    }else if(sc2.isDone){
      h+='<div style="margin-top:8px;display:flex;align-items:center;gap:6px"><span style="font-size:11px;font-weight:700;color:var(--text-muted)">부착 위치</span><span class="gps-badge no-gps">GPS 정보 없음</span></div>';
    }
    h+='</div></div>';
  }
  if(curRegion)h+='</div>';
  h+='</div>';
  document.getElementById("reportContent").innerHTML=h;
  // 학교별 GPS 미니맵 렌더링
  setTimeout(function(){renderSchoolMiniMaps(schools)},800);
}

// ── 학교별 GPS 미니맵 렌더링 (포스터=보라, 현수막=주황) ──
var GPS_COLOR_POSTER="#7C3AED";  // 보라
var GPS_COLOR_BANNER="#EA580C";  // 주황

function makeSvgMarkerUrl(color,size){
  size=size||24;
  return "data:image/svg+xml;charset=utf-8,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle cx="'+size/2+'" cy="'+size/2+'" r="'+(size/2-2)+'" fill="'+color+'" stroke="#fff" stroke-width="2"/></svg>');
}

function renderSchoolMiniMaps(schools){
  if(typeof kakao==="undefined"||!kakao.maps)return;
  for(var i=0;i<schools.length;i++){
    var sc=schools[i];
    var gps=sc.gps||{poster:[],banner:[]};
    var hasPosterGps=gps.poster&&gps.poster.length>0;
    var hasBannerGps=gps.banner&&gps.banner.length>0;
    if(!hasPosterGps&&!hasBannerGps)continue;
    var miniEl=document.getElementById("minimap-"+i);
    if(!miniEl)continue;
    
    // 첫 좌표로 센터 설정
    var firstPt=hasPosterGps?gps.poster[0]:(hasBannerGps?gps.banner[0]:null);
    if(!firstPt)continue;
    var miniMap=new kakao.maps.Map(miniEl,{center:new kakao.maps.LatLng(firstPt.lat,firstPt.lng),level:4});
    var bounds=new kakao.maps.LatLngBounds();
    var markerCount=0;
    
    // 포스터 마커 (보라)
    if(hasPosterGps){
      var posterImg=new kakao.maps.MarkerImage(makeSvgMarkerUrl(GPS_COLOR_POSTER,28),new kakao.maps.Size(28,28),{offset:new kakao.maps.Point(14,14)});
      for(var pi2=0;pi2<gps.poster.length;pi2++){
        var pp=new kakao.maps.LatLng(gps.poster[pi2].lat,gps.poster[pi2].lng);
        bounds.extend(pp);
        new kakao.maps.Marker({map:miniMap,position:pp,title:"포스터 "+(pi2+1),image:posterImg});
        markerCount++;
      }
    }
    // 현수막 마커 (주황)
    if(hasBannerGps){
      var bannerImg=new kakao.maps.MarkerImage(makeSvgMarkerUrl(GPS_COLOR_BANNER,28),new kakao.maps.Size(28,28),{offset:new kakao.maps.Point(14,14)});
      for(var bi2=0;bi2<gps.banner.length;bi2++){
        var bp=new kakao.maps.LatLng(gps.banner[bi2].lat,gps.banner[bi2].lng);
        bounds.extend(bp);
        new kakao.maps.Marker({map:miniMap,position:bp,title:"현수막 "+(bi2+1),image:bannerImg});
        markerCount++;
      }
    }
    if(markerCount>1)miniMap.setBounds(bounds);
    else miniMap.setLevel(3);
  }
}

function buildPlaceholder(text){
  return '<div class="photo-thumb"><div class="photo-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>'+(text||"")+'</span></div></div>';
}

function openLightbox(src){var lb=document.getElementById("lightbox");document.getElementById("lightbox-img").src=src;lb.classList.add("show");document.body.style.overflow="hidden"}
function closeLightbox(){document.getElementById("lightbox").classList.remove("show");document.body.style.overflow=""}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeLightbox()});

// 초기 로딩
loadReportData();

// 자동 새로고침
setInterval(loadReportData, AUTO_REFRESH_SEC * 1000);

</script>
