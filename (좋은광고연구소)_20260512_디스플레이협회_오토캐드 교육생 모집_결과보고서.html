<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>디스플레이협회_오토캐드 교육생 모집 결과보고서</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9FAFB;--surface:#FFFFFF;--surface-alt:#F3F4F6;
  --border:#E5E7EB;--border-light:#F3F4F6;
  --text:#0D1B3E;--text-secondary:#6B7280;--text-muted:#6B7280;
  --accent:#2D5DA1;--accent-light:#DBEAFE;--accent-lighter:#DBEAFE;
  --positive:#0EA47A;--positive-light:#D4EDDA;--positive-bg:#D4EDDA;
  --negative:#DC3545;--negative-light:#F8D7DA;--negative-bg:#F8D7DA;
  --warning:#E6940A;--warning-light:#FFF3CD;--warning-bg:#FFF3CD;
  --orange:#E6940A;--orange-light:#FFF3CD;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.07);
  --r:14px;
}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;background:#E5E7EB;color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;padding:24px 16px}
.report-page{max-width:1280px;margin:0 auto;background:var(--bg);border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.06)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.skeleton{background:linear-gradient(90deg,var(--surface-alt) 25%,#E5E7EB 50%,var(--surface-alt) 75%);background-size:200% 100%;animation:pulse 1.5s ease-in-out infinite;border-radius:8px;height:20px}
.report-header{background:linear-gradient(135deg,#1A1D27 0%,#374151 100%);color:#fff;padding:40px 0;position:relative;overflow:hidden}
.report-header::before{content:"";position:absolute;top:-50%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,0.03),transparent 70%);pointer-events:none}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;position:relative}
.header-label{font-size:12px;font-weight:700;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.header-title{font-size:2rem;font-weight:900;letter-spacing:-0.04em;line-height:1.2}
.header-sub{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;font-weight:500}
.header-meta{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}
.meta-chip{background:rgba(255,255,255,0.08);padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:6px}
.meta-chip svg{width:14px;height:14px;opacity:0.5}
.header-logo{position:absolute;top:20px;right:24px}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.08);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:20px;height:20px}
.logo-text{font-size:13px;font-weight:900;color:rgba(255,255,255,0.7);letter-spacing:-0.03em}
.live-indicator{display:inline-flex;align-items:center;gap:6px;background:rgba(5,150,105,0.15);border:1px solid rgba(5,150,105,0.2);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#0EA47A}
.live-dot{width:6px;height:6px;background:#0EA47A;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.container{max-width:1280px;margin:0 auto;padding:0 24px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:28px;position:relative;z-index:1}
.kpi-card{background:var(--surface);border-radius:var(--r);padding:24px 20px;box-shadow:var(--shadow-md);border:1px solid var(--border-light);text-align:center}
.kpi-value{font-size:2.4rem;font-weight:900;letter-spacing:-0.03em;line-height:1;font-variant-numeric:tabular-nums}
.kpi-label{font-size:12px;font-weight:700;color:var(--text-muted);margin-top:10px;text-transform:uppercase;letter-spacing:0.04em}
.kpi-sub{font-size:12px;font-weight:600;margin-top:8px}
.kpi-card .kpi-value{color:#0D1B3E}
.kpi-card .kpi-sub{color:#2D5DA1}
.kpi-card.progress{border-top:3px solid #0EA47A}
.kpi-card.progress .kpi-value{color:#0EA47A;font-size:2.2rem}
.kpi-card.progress .kpi-sub{color:#0EA47A}
.progress-section{margin-top:32px}
.progress-bar-wrap{background:var(--surface);border-radius:var(--r);padding:20px 24px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-title{font-size:13px;font-weight:700;color:var(--text-secondary)}
.progress-pct{font-size:22px;font-weight:900;color:var(--positive)}
.progress-track{height:14px;background:var(--surface-alt);border-radius:7px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--positive));border-radius:7px;transition:width 0.8s ease}
.progress-detail{display:flex;gap:24px;margin-top:12px;font-size:12px;color:var(--text-muted);font-weight:600}
.progress-detail span{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-done{background:var(--positive)}.dot-remain{background:var(--border)}
.section{margin-top:36px}
.section-title{font-size:13px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::after{content:"";flex:1;height:1px;background:var(--border)}
.region-group{margin-bottom:24px}
.region-label{font-size:16px;font-weight:800;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border-light);display:flex;align-items:center;gap:8px}
.region-count{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-lighter);padding:2px 8px;border-radius:10px}
.summary-table-wrap{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden}
.summary-table{width:100%;border-collapse:collapse}
.summary-table thead th{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;padding:10px 14px;text-align:left;background:var(--surface-alt);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5;box-shadow:inset 0 -1px 0 rgba(0,0,0,.08)}
.summary-table thead th:nth-child(n+4){text-align:center}
.summary-table tbody td{font-size:14px;padding:10px 14px;border-bottom:1px solid var(--border-light);color:var(--text-secondary);vertical-align:middle}
.summary-table tbody td:first-child{font-weight:700;color:var(--text);text-align:center}
.summary-table tbody td:nth-child(n+4){text-align:center}
.summary-table tbody tr:last-child td{border-bottom:none}
.summary-table tbody tr:hover td{background:var(--accent-lighter)}
.summary-table tfoot td{font-size:14px;font-weight:800;padding:10px 14px;background:var(--surface-alt);color:var(--text);border-top:1px solid var(--border)}
.summary-table tfoot td:nth-child(n+4){text-align:center}
.region-tag{font-size:12px;font-weight:600;color:var(--text-muted)}
.summary-note{font-size:12px;color:var(--text-muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.date-text{font-variant-numeric:tabular-nums;font-weight:600;color:var(--text)}
.school-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden;margin-bottom:16px;transition:all 0.3s ease}
.school-card.card-done{opacity:1}
.school-card.card-pending{opacity:0.7}
.school-card.card-pending .school-card-header{border-bottom:none}
.school-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background 0.15s;gap:12px;user-select:none}
.school-card-header:hover{background:var(--surface-alt)}
.card-body{overflow:hidden;transition:max-height 0.35s ease,opacity 0.25s ease}
.card-body.collapsed{max-height:0!important;opacity:0;padding:0}
.card-toggle{width:20px;height:20px;flex-shrink:0;transition:transform 0.25s ease;color:var(--text-muted)}
.card-toggle.open{transform:rotate(180deg)}
.header-qty{display:flex;align-items:center;gap:12px;margin-left:auto;margin-right:12px;flex-shrink:0}
.school-info{display:flex;align-items:center;gap:12px}
.school-num{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.school-name{font-size:15px;font-weight:800;letter-spacing:-0.02em}
.school-addr{font-size:12px;color:var(--text-muted);margin-top:1px}
.school-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.status-done{background:var(--positive-bg);color:var(--positive)}
.status-pending{background:var(--surface-alt);color:var(--text-muted)}
.qty-header{display:flex;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border-light);background:var(--surface-alt)}
.qty-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700}
.qty-item .qty-label{font-size:12px;font-weight:600;color:var(--text-muted)}
.qty-poster{color:#1E3F75}.qty-banner{color:var(--orange)}
.attach-info{padding:12px 20px;display:flex;gap:24px;flex-wrap:wrap;font-size:13px;border-bottom:1px solid var(--border-light)}
.attach-info-item{display:flex;align-items:center;gap:6px}
.attach-info-label{font-size:12px;font-weight:600;color:var(--text-muted)}
.attach-info-value{font-weight:700;color:var(--text)}
.photo-section{padding:0 20px 16px}
.photo-label{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.photo-thumb{aspect-ratio:4/3;border-radius:10px;overflow:hidden;background:var(--surface-alt);position:relative;cursor:pointer;border:1px solid var(--border-light)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.2s}
.photo-thumb:hover img{transform:scale(1.05)}
.photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;flex-direction:column;gap:4px}
.photo-placeholder svg{width:24px;height:24px;opacity:0.3}
.drive-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;padding:4px 10px;border-radius:8px;transition:background 0.15s}
.drive-link:hover{background:var(--accent-lighter)}
.drive-link svg{width:14px;height:14px}
.loading-wrap{text-align:center;padding:80px 20px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted);font-weight:600}
.error-wrap{text-align:center;padding:80px 20px;color:var(--negative)}
.refresh-btn{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:16px;font-family:inherit}
.report-footer{margin-top:48px;padding:28px 0;border-top:1px solid var(--border);text-align:left}
.footer-inner{display:flex;align-items:center;gap:16px}
.footer-logo{font-size:13px;font-weight:800;color:var(--text-muted);letter-spacing:-0.01em;flex-shrink:0}
.footer-info{font-size:12px;color:var(--text-muted)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.lightbox-close{position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
@media(max-width:768px){
  body{padding:0}
  .report-page{border-radius:0;box-shadow:none}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:14px;margin-top:20px}
  .kpi-value{font-size:1.5rem}
  .header-title{font-size:1.5rem}
  .container{padding:0 16px}
  .report-header{padding:28px 0}
  .header-logo{position:static;margin-bottom:14px}
  .school-card-header{flex-direction:column;align-items:flex-start;gap:10px}
  .photo-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .photo-thumb{min-height:120px}
  .attach-info{flex-direction:column;gap:6px}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .kpi-card{padding:18px 14px}
  .kpi-value{font-size:1.3rem}
  .header-title{font-size:1.3rem}
  .progress-detail{flex-direction:column;gap:6px}
}
@media print{
  @page{size:A4 landscape;margin:10mm}
  body{background:#fff!important;color:#1A1D27!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:0!important}
  .report-page{box-shadow:none!important;border-radius:0!important;max-width:none!important;background:#FFFFFF!important}
  .map-wrap{display:none!important}
  .kpi-card,.progress-bar-wrap,.summary-table-wrap,.school-card{background:#F9FAFB!important;border:1px solid #E5E7EB!important;box-shadow:none!important}
  .summary-table thead th,.summary-table tfoot td{background:#F3F4F6!important}
  .school-card-header{background:transparent!important}
  .report-header,.kpi-grid,.progress-section{break-inside:avoid;page-break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .section{break-before:page;page-break-before:always}
  .section:first-of-type{break-before:auto;page-break-before:auto}
  .school-card{break-inside:avoid;page-break-inside:avoid;box-shadow:none;border:1px solid #ddd;margin-bottom:8mm}
  .photo-thumb{break-inside:avoid;page-break-inside:avoid;aspect-ratio:4/3;width:100%;height:auto;border:1px solid #ddd;border-radius:4px;overflow:hidden}
  .photo-grid .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;max-height:none}
  .photo-grid{grid-template-columns:repeat(4,1fr);gap:3mm}
  .header-sub{display:none!important}
  #metaSchools{display:none!important}
  .school-card-header{flex-direction:row!important;align-items:center!important;flex-wrap:nowrap!important;gap:12px}
  .school-info{flex:1 1 auto;min-width:0}
  .header-qty,.school-status,.card-toggle{flex-shrink:0}
  .lightbox,.live-indicator,.refresh-btn,.no-print,button.no-print{display:none!important}
  .kpi-card,.progress-bar-wrap,.summary-table-wrap,.school-card{box-shadow:none}
  .kpi-card,.progress-fill{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card-body.collapsed{max-height:none!important;opacity:1}
  a[href]::after{content:none!important}
}
a:hover,.summary-table a:hover{text-decoration:underline}
.drive-link:hover{text-decoration:underline;background:var(--accent-lighter)}
.kpi-label,.kpi-sub,.progress-detail,.summary-note,.region-tag,.school-addr,.school-status,.qty-item .qty-label,.attach-info-label,.photo-label,.drive-link,.footer-info{font-size:13px}
a[target="_blank"]::after{content:" \2197";color:var(--text-muted);font-size:.9em}
</style>
</head>

function loadReportData(){
  fetch(WEB_APP_URL+"?action=report_data&camp="+encodeURIComponent(CAMP_KEY))
  .then(function(r){return r.json()})
  .then(function(json){
    if(json.status!=="ok"){showError(json.message||"데이터 로딩 실패");return}
    renderReport(json);
  })
  .catch(function(err){showError("네트워크 오류: "+err.message)})
}

function showError(msg){
  document.getElementById("reportContent").innerHTML=
    '<div class="error-wrap"><div style="font-size:48px;margin-bottom:16px">⚠️</div>'
    +'<div style="font-size:16px;font-weight:700">'+escHtml(msg)+'</div>'
    +'<button class="refresh-btn" onclick="loadReportData()">다시 시도</button></div>';
}

function openSchoolMap(name,gpsArr){
  var existing=document.getElementById("schoolMapOverlay");
  if(existing)existing.remove();
  var overlay=document.createElement("div");
  overlay.id="schoolMapOverlay";
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)";

  popup.style.cssText="background:#fff;border-radius:16px;width:90vw;max-width:700px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3)";
  var header=document.createElement("div");
  header.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #E5E7EB";
  var titleDiv=document.createElement("div");
  titleDiv.style.cssText="font-size:14px;font-weight:800";
  titleDiv.innerHTML=escHtml(name)+" <span style=\"color:#0EA47A;font-size:12px\">GPS "+gpsArr.length+"건</span>";
  var closeBtn=document.createElement("button");
  closeBtn.textContent="\u2715";
  closeBtn.style.cssText="background:none;border:none;font-size:20px;cursor:pointer;color:#9CA3AF;padding:4px";
  closeBtn.addEventListener("click",function(){var el=document.getElementById("schoolMapOverlay");if(el)el.remove()});
  header.appendChild(titleDiv);
  header.appendChild(closeBtn);
  var mapDiv=document.createElement("div");
  mapDiv.style.cssText="width:100%;height:520px";
  popup.appendChild(header);
  popup.appendChild(mapDiv);
  overlay.appendChild(popup);
  overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.remove()});
  document.body.appendChild(overlay);
  var map=new naver.maps.Map(mapDiv,{center:new naver.maps.LatLng(gpsArr[0].lat,gpsArr[0].lng),zoom:15});
  var bounds=new naver.maps.LatLngBounds();
  for(var i=0;i<gpsArr.length;i++){
    var pos=new naver.maps.LatLng(gpsArr[i].lat,gpsArr[i].lng);
    bounds.extend(pos);
    var el=document.createElement("div");

  var idMatch=src.match(/\/d\/([^=\/]+)/) || src.match(/[?&]id=([^&]+)/);
  if(idMatch&&!img.dataset.retried){
    img.dataset.retried="1";
    img.src="https://drive.google.com/thumbnail?id="+idMatch[1]+"&sz=w1200";
    return;
  }
  // v3.9.7: 재시도도 실패 → Drive에서 삭제된 사진이므로 썸네일 자체를 제거 + 번호 재카운트
  try{
    var thumb=img.closest(".photo-thumb");
    var grid=thumb&&thumb.parentNode;
    if(thumb)thumb.remove();
    if(grid){
      var remaining=grid.querySelectorAll(".photo-thumb img");
      for(var i=0;i<remaining.length;i++){
        var alt=remaining[i].alt||"";
        remaining[i].alt=alt.replace(/\s\d+$/," "+(i+1));
      }
      if(remaining.length===0){var sec=grid.closest(".photo-section");if(sec)sec.style.display="none";}
    }
  }catch(e){}
}
function toggleCard(headerEl){
  var card=headerEl.parentElement;
  var body=card.querySelector(".card-body");
  var toggle=headerEl.querySelector(".card-toggle");
  if(body.classList.contains("collapsed")){
    body.classList.remove("collapsed");
    body.style.maxHeight=body.scrollHeight+"px";
    if(toggle)toggle.classList.add("open");
    setTimeout(function(){body.style.maxHeight="none"},350);
  } else {
    body.style.maxHeight=body.scrollHeight+"px";
    body.offsetHeight;
    body.classList.add("collapsed");
    if(toggle)toggle.classList.remove("open");
  }
}
function openLightbox(src){var lb=document.getElementById("lightbox");document.getElementById("lightbox-img").src=src;lb.classList.add("show");document.body.style.overflow="hidden"}
function closeLightbox(){document.getElementById("lightbox").classList.remove("show");document.body.style.overflow=""}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeLightbox()});

loadReportData();
if(!window._printMode){setInterval(loadReportData, AUTO_REFRESH_SEC * 1000);}

</script>
