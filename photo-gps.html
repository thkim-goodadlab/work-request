<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 위치 등록</title>
<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<style>
  :root{
    --navy900:#0D1B3E;--navy700:#1E3F75;--blue600:#2D5DA1;--sky400:#7EC8E3;
    --success:#0EA47A;--successL:#D4EDDA;--error:#DC3545;--warnL:#FFF3CD;--warn:#E6940A;
    --g950:#1A1D27;--g700:#374151;--g500:#6B7280;--g200:#E5E7EB;--g50:#F9FAFB;--white:#fff;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;
    background:var(--g50);color:var(--g950);padding:0 0 90px;-webkit-text-size-adjust:100%;}
  header{background:var(--navy900);color:#fff;padding:24px 20px 20px;border-bottom:6px solid var(--sky400);}
  header h1{margin:0;font-size:20px;font-weight:800;}
  header p{margin:7px 0 0;font-size:13px;color:var(--sky400);}
  .wrap{padding:18px;max-width:560px;margin:0 auto;}
  .note{background:var(--warnL);border-left:6px solid var(--warn);border-radius:10px;
    padding:13px 15px;font-size:14px;color:#7a4e00;line-height:1.6;margin-bottom:18px;}
  .pickbtn{display:block;width:100%;background:var(--navy900);color:#fff;border:none;border-radius:13px;
    padding:18px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px;}
  .pickbtn:active{transform:scale(0.98);}
  .hint{font-size:13px;color:var(--g500);text-align:center;margin:0 0 16px;line-height:1.5;}
  input[type=file]{display:none;}
  .summary{background:var(--navy700);color:#fff;border-radius:12px;padding:13px 15px;
    font-size:15px;font-weight:700;margin-bottom:12px;display:none;}
  .card{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .fname{font-size:12px;color:var(--g500);word-break:break-all;margin-bottom:6px;}
  .ok{color:var(--success);font-weight:800;font-size:15px;}
  .no{color:var(--error);font-weight:800;font-size:15px;}
  .coord{font-size:14px;color:var(--g950);margin-top:4px;font-weight:600;}
  .savebar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--g200);
    padding:12px 18px;max-width:560px;margin:0 auto;}
  .savebtn{display:block;width:100%;background:var(--success);color:#fff;border:none;border-radius:13px;
    padding:17px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;}
  .savebtn:disabled{background:#9CA3AF;}
  .savebtn:active:not(:disabled){transform:scale(0.98);}
  .saved-msg{margin-top:10px;text-align:center;font-size:14px;font-weight:700;color:var(--success);display:none;}
</style>
</head>
<body>
<header>
  <h1>사진 위치 등록</h1>
  <p id="who">찍은 사진을 골라 위치를 저장하세요</p>
</header>
<div class="wrap">
  <div class="note">
    <b>꼭 '내 파일'로 선택하세요.</b> 아래 버튼을 누른 뒤 뜨는 창에서
    <b>'내 파일' / '파일'</b> → <b>DCIM ▸ Camera</b>에서 사진을 고르세요.<br>
    (갤러리·사진으로 고르면 위치가 사라집니다.)
  </div>
  <button class="pickbtn" onclick="document.getElementById('f').click()">📁 사진 선택 (내 파일)</button>
  <p class="hint">해당 학교에서 찍은 사진을 한꺼번에 선택하세요</p>
  <input type="file" id="f" multiple accept="*/*" onchange="handleFiles(this.files)">
  <div class="summary" id="summary"></div>
  <div id="results"></div>
</div>
<div class="savebar">
  <button class="savebtn" id="saveBtn" disabled onclick="saveAll()">위치 저장하기</button>
  <div class="saved-msg" id="savedMsg">✓ 저장 요청을 보냈습니다</div>
</div>

<script>
var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzWyoa0VRxbVpKR8K6yen4PucC1VHHsq-pshwGC1JiJcZtUtJsynbWThiaw26g02yBZyw/exec";
var WORKER = (new URLSearchParams(location.search)).get("worker") || "";
if (WORKER) document.getElementById('who').textContent = WORKER + " · 사진 위치 등록";

var collected = []; // [{name,lat,lng,time}]

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function comp(x){ if(x==null) return 0; if(Array.isArray(x)) return x[1]?(x[0]/x[1]):0; var n=Number(x); return isFinite(n)?n:0; }
function dmsToDec(dms,ref){ if(!dms) return NaN; var v=comp(dms[0])+comp(dms[1])/60+comp(dms[2])/3600; if(ref==="S"||ref==="W"||ref===83||ref===87) v=-v; return v; }
function fmtDate(s){ return s ? String(s).replace(/^(\d{4}):(\d{2}):(\d{2})/,"$1-$2-$3") : ""; }

function handleFiles(files){
  collected = [];
  var total = 0, ok = 0, pending = files.length;
  document.getElementById('results').innerHTML = "";
  document.getElementById('summary').style.display = "none";
  document.getElementById('savedMsg').style.display = "none";
  document.getElementById('saveBtn').disabled = true;

  Array.prototype.forEach.call(files, function(file){
    total++;
    var reader = new FileReader();
    reader.onload = function(e){
      var card = document.createElement('div');
      card.className = 'card';
      var html = '<div class="fname">' + esc(file.name) + '</div>';
      try{
        var exif = piexif.load(e.target.result);
        var gps = exif["GPS"] || {};
        var lat = gps[piexif.GPSIFD.GPSLatitude], latRef = gps[piexif.GPSIFD.GPSLatitudeRef];
        var lon = gps[piexif.GPSIFD.GPSLongitude], lonRef = gps[piexif.GPSIFD.GPSLongitudeRef];
        var dt = (exif["Exif"]||{})[piexif.ExifIFD.DateTimeOriginal];
        var latD = dmsToDec(lat, latRef), lonD = dmsToDec(lon, lonRef);
        if(lat && lon && isFinite(latD) && isFinite(lonD) && (latD!==0 || lonD!==0)){
          ok++;
          collected.push({ name:file.name, lat:Number(latD.toFixed(7)), lng:Number(lonD.toFixed(7)), time:fmtDate(dt) });
          html += '<div class="ok">위치 확인 ✓</div>';
          html += '<div class="coord">위도 ' + latD.toFixed(6) + ' / 경도 ' + lonD.toFixed(6) + '</div>';
        } else {
          html += '<div class="no">위치 없음 (내 파일로 골랐는지 확인)</div>';
        }
      } catch(err){
        html += '<div class="no">읽기 실패</div>';
      }
      card.innerHTML = html;
      document.getElementById('results').appendChild(card);
      pending--;
      if(pending === 0) finish(total, ok);
    };
    reader.readAsDataURL(file);
  });
}

function finish(total, ok){
  var s = document.getElementById('summary');
  s.style.display = "block";
  s.textContent = total + "장 중 " + ok + "장에서 위치를 읽었습니다.";
  document.getElementById('saveBtn').disabled = (ok === 0);
}

function saveAll(){
  if(!collected.length) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = "저장 중...";
  sendRows(0);
}

function sendRows(retry){
  fetch(WEB_APP_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ action: "savePhotoGps", worker: WORKER, data: collected })
  }).then(function(){
    document.getElementById('savedMsg').style.display = "block";
    var btn = document.getElementById('saveBtn');
    btn.textContent = collected.length + "장 위치 저장 완료";
  }).catch(function(){
    if(retry < 2){ setTimeout(function(){ sendRows(retry+1); }, 1200*(retry+1)); }
    else { var btn=document.getElementById('saveBtn'); btn.disabled=false; btn.textContent="다시 저장하기"; alert("서버 연결 실패 — 다시 시도해주세요"); }
  });
}
</script>
</body>
</html>
