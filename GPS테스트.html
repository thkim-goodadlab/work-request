<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📍 사진 GPS 추출 테스트</title>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  background: #F8FAFB;
  color: #0F172A;
  padding: 16px;
  line-height: 1.5;
}
.container { max-width: 600px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 8px; }
.sub { color: #64748B; font-size: 14px; margin-bottom: 20px; }
.notice {
  background: #FEF3C7;
  border-left: 4px solid #F59E0B;
  padding: 12px;
  border-radius: 6px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #92400E;
}
.notice b { display: block; margin-bottom: 4px; }
.pick-btn {
  display: block;
  width: 100%;
  background: #2563EB;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 18px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 8px;
  font-family: inherit;
}
.pick-btn:active { background: #1D4ED8; }
.small-btn {
  display: inline-block;
  background: #E2E8F0;
  color: #334155;
  border: none;
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 20px;
  font-family: inherit;
}
.summary {
  background: white;
  border: 1px solid #E2E8F0;
  border-radius: 10px;
  padding: 14px;
  margin: 16px 0;
  font-size: 14px;
}
.summary .ok { color: #059669; font-weight: 700; }
.summary .ng { color: #DC2626; font-weight: 700; }
.result {
  background: white;
  border: 1px solid #E2E8F0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  font-size: 13px;
  word-break: break-all;
}
.result.has-gps { border-left: 4px solid #059669; }
.result.no-gps { border-left: 4px solid #DC2626; }
.result .name {
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 14px;
  color: #0F172A;
}
.result .gps-line {
  background: #ECFDF5;
  padding: 8px;
  border-radius: 6px;
  margin: 6px 0;
  color: #065F46;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 12px;
}
.result .no-gps-line {
  background: #FEF2F2;
  padding: 8px;
  border-radius: 6px;
  margin: 6px 0;
  color: #991B1B;
  font-size: 12px;
}
.result .meta {
  color: #64748B;
  font-size: 12px;
  margin-top: 4px;
}
.result a {
  display: inline-block;
  background: #2563EB;
  color: white;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 12px;
  margin-top: 6px;
}
#fileInput { display: none; }
.status {
  text-align: center;
  color: #64748B;
  padding: 20px;
  font-size: 14px;
}
.debug-toggle {
  font-size: 11px;
  color: #64748B;
  margin-top: 6px;
  cursor: pointer;
  text-decoration: underline;
}
.debug {
  background: #0F172A;
  color: #CBD5E1;
  padding: 10px;
  border-radius: 6px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 10px;
  margin-top: 6px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
  display: none;
}
.debug.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>📍 사진 GPS 추출 테스트</h1>
  <p class="sub">사진을 선택하면 위치정보(GPS)가 추출되는지 확인합니다.</p>

  <div class="notice">
    <b>📱 아이폰 사용 시 주의</b>
    아이폰 카메라 앱 → 설정 → 카메라 → <b>"기기에 저장된 원본 보존"</b> 켜져 있어야 GPS가 유지됩니다.<br>
    또한 사진 선택 시 Safari가 <b>"모든 사진 허용"</b> 으로 설정되어야 합니다.
  </div>

  <button class="pick-btn" onclick="document.getElementById('fileInput').click()">
    📷 사진 선택하기 (여러 장 가능)
  </button>
  <input type="file" id="fileInput" accept="image/*" multiple>

  <div id="results"></div>
</div>

<script>
var input = document.getElementById('fileInput');
var resultsEl = document.getElementById('results');

input.addEventListener('change', function(){
  var files = Array.from(input.files || []);
  if (!files.length) return;

  resultsEl.innerHTML = '<div class="status">⏳ 분석 중... (' + files.length + '장)</div>';

  var results = [];
  var done = 0;

  files.forEach(function(f, idx){
    var entry = { file: f, gps: null, meta: {}, error: null, raw: null };
    results[idx] = entry;

    // exifr로 모든 EXIF 데이터 파싱 (디버깅용)
    var p1 = (window.exifr ? exifr.parse(f, true) : Promise.resolve(null))
      .then(function(all){
        entry.raw = all || {};
        if (all) {
          entry.meta.make       = all.Make || '';
          entry.meta.model      = all.Model || '';
          entry.meta.dateTaken  = all.DateTimeOriginal || all.CreateDate || '';
          entry.meta.orientation= all.Orientation || '';
        }
      })
      .catch(function(e){ entry.error = 'parse:' + e.message; });

    // GPS만 따로 뽑기
    var p2 = (window.exifr ? exifr.gps(f) : Promise.resolve(null))
      .then(function(g){
        if (g && g.latitude && g.longitude) {
          entry.gps = g;
        }
      })
      .catch(function(e){ entry.error = (entry.error || '') + ' gps:' + e.message; });

    Promise.all([p1, p2]).finally(function(){
      done++;
      if (done === files.length) render(results);
    });
  });
});

function render(results){
  var withGps = results.filter(function(r){ return r.gps; }).length;
  var withoutGps = results.length - withGps;

  var html = '<div class="summary">'
           + '📸 전체 ' + results.length + '장<br>'
           + '<span class="ok">✅ GPS 있음: ' + withGps + '장</span><br>'
           + '<span class="ng">⚠️ GPS 없음: ' + withoutGps + '장</span>'
           + '</div>';

  results.forEach(function(r, idx){
    var cls = r.gps ? 'has-gps' : 'no-gps';
    html += '<div class="result ' + cls + '">';
    html += '<div class="name">' + (idx+1) + '. ' + escapeHtml(r.file.name)
          + ' <span class="meta">(' + formatSize(r.file.size) + ')</span></div>';

    if (r.gps) {
      var lat = r.gps.latitude.toFixed(6);
      var lng = r.gps.longitude.toFixed(6);
      html += '<div class="gps-line">📍 위도: ' + lat + '<br>📍 경도: ' + lng + '</div>';
      html += '<a href="https://www.google.com/maps?q=' + lat + ',' + lng
            + '" target="_blank">🗺 구글맵에서 열기</a> ';
      html += '<a href="https://map.naver.com/v5/search/' + lat + ',' + lng
            + '" target="_blank" style="background:#22C55E">네이버지도</a>';
    } else {
      html += '<div class="no-gps-line">❌ GPS 정보 없음</div>';
      if (r.error) {
        html += '<div class="meta">오류: ' + escapeHtml(r.error) + '</div>';
      }
    }

    if (r.meta.dateTaken) html += '<div class="meta">📅 촬영일: ' + r.meta.dateTaken + '</div>';
    if (r.meta.make || r.meta.model) html += '<div class="meta">📷 ' + r.meta.make + ' ' + r.meta.model + '</div>';

    html += '<div class="debug-toggle" onclick="toggleDebug(this)">🔍 원본 EXIF 데이터 보기</div>';
    html += '<pre class="debug">' + escapeHtml(JSON.stringify(r.raw, null, 2) || '(없음)') + '</pre>';
    html += '</div>';
  });

  // 재선택 버튼
  html += '<button class="small-btn" onclick="document.getElementById(\'fileInput\').click()">🔄 다시 선택</button>';

  resultsEl.innerHTML = html;
}

function toggleDebug(el) {
  var d = el.nextElementSibling;
  if (d && d.classList.contains('debug')) d.classList.toggle('show');
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c];
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}
</script>
</body>
</html>
